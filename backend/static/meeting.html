<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S Meeting</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .header p { font-size: 14px; opacity: 0.9; }
        .content {
            padding: 40px;
        }
        .setup {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        .setup-section h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            color: #666;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
        }
        button {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(42, 82, 152, 0.3);
        }
        button:active {
            transform: translateY(0);
        }
        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        video {
            width: 100%;
            background: #000;
            border-radius: 8px;
        }
        .status {
            padding: 15px;
            background: #f5f5f5;
            border-radius: 6px;
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        .status.connected {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #2a5298;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #004085;
        }
        .call-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            .setup { grid-template-columns: 1fr; }
            .video-grid { grid-template-columns: 1fr; }
            .content { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 J.A.R.V.I.S Meeting</h1>
            <p>WebRTC Video Conference</p>
        </div>
        <div class="content">
            <div class="info-box">
                <strong>ℹ️ Setup:</strong> Enter a room ID, then open this page in another browser/device with the same room ID to connect.
            </div>

            <div class="status" id="status">Initializing...</div>

            <div class="setup">
                <div class="setup-section">
                    <h2>Configuration</h2>
                    <div class="form-group">
                        <label for="roomId">Room ID:</label>
                        <input type="text" id="roomId" placeholder="e.g., room-123" value="demo-room">
                    </div>
                    <button onclick="startMeeting()">Start Meeting</button>
                </div>
                <div class="setup-section">
                    <h2>Status</h2>
                    <p id="connectionStatus">Not connected</p>
                    <p id="videoStatus">Camera not initialized</p>
                </div>
            </div>

            <div class="call-controls">
                <button onclick="toggleAudio()">🔊 Mute</button>
                <button onclick="toggleVideo()">📷 Hide Video</button>
                <button onclick="endCall()">🏁 End Call</button>
            </div>

            <div class="video-grid">
                <div>
                    <h3 style="margin-bottom: 10px; color: #333;">Your Video</h3>
                    <video id="localVideo" autoplay muted playsinline></video>
                </div>
                <div>
                    <h3 style="margin-bottom: 10px; color: #333;">Remote Video</h3>
                    <video id="remoteVideo" autoplay playsinline></video>
                </div>
            </div>
        </div>
    </div>

    <script>
        let peerConnection;
        let localStream;
        let ws;
        let roomId = 'demo-room';
        let isMuted = false;
        let isVideoHidden = false;

        const servers = {
            iceServers: [
                { urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302'] }
            ]
        };

        async function startMeeting() {
            roomId = document.getElementById('roomId').value || 'demo-room';
            updateStatus(`Joining room: ${roomId}...`);
            
            try {
                // Get user media
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                updateVideoStatus('Camera active');

                // Create peer connection
                peerConnection = new RTCPeerConnection(servers);
                
                // Add local stream tracks
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });

                // Handle remote stream
                peerConnection.ontrack = (event) => {
                    document.getElementById('remoteVideo').srcObject = event.streams[0];
                    updateConnectionStatus('Connected to peer');
                };

                // Handle ICE candidates
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate && ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'ice', candidate: event.candidate }));
                    }
                };

                // Create WebSocket connection
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}/ws/meet/${roomId}`;
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    updateConnectionStatus('WebSocket connected');
                    createOffer();
                };

                ws.onmessage = async (event) => {
                    const data = JSON.parse(event.data);
                    if (data.type === 'offer') {
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                        const answer = await peerConnection.createAnswer();
                        await peerConnection.setLocalDescription(answer);
                        ws.send(JSON.stringify({ type: 'answer', answer: answer }));
                    } else if (data.type === 'answer') {
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                    } else if (data.type === 'ice') {
                        try {
                            await peerConnection.addIceCandidate(data.candidate);
                        } catch (e) {
                            console.error('Error adding ICE candidate:', e);
                        }
                    }
                };

                ws.onerror = (error) => {
                    updateStatus('❌ WebSocket error', true);
                };

                ws.onclose = () => {
                    updateConnectionStatus('WebSocket disconnected');
                };

            } catch (error) {
                updateStatus(`❌ Error: ${error.message}`, true);
            }
        }

        async function createOffer() {
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            ws.send(JSON.stringify({ type: 'offer', offer: offer }));
            updateStatus('✅ Offer sent');
        }

        function toggleAudio() {
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(track => {
                track.enabled = !isMuted;
            });
            document.querySelector('button').textContent = isMuted ? '🔇 Unmute' : '🔊 Mute';
        }

        function toggleVideo() {
            isVideoHidden = !isVideoHidden;
            localStream.getVideoTracks().forEach(track => {
                track.enabled = !isVideoHidden;
            });
            document.querySelectorAll('button')[1].textContent = isVideoHidden ? '📷‍♂️ Show Video' : '📷 Hide Video';
        }

        function endCall() {
            if (peerConnection) peerConnection.close();
            if (ws) ws.close();
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            updateStatus('Call ended');
            updateConnectionStatus('Not connected');
        }

        function updateStatus(message, isError = false) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = isError ? 'status error' : 'status';
        }

        function updateConnectionStatus(message) {
            document.getElementById('connectionStatus').textContent = message;
        }

        function updateVideoStatus(message) {
            document.getElementById('videoStatus').textContent = message;
        }

        // Initialize on load
        updateStatus('Ready. Click "Start Meeting" to begin.');
    </script>
</body>
</html>
